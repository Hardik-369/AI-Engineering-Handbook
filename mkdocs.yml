site_name: AI Engineering Handbook
site_description: The definitive free handbook for mastering modern AI engineering — LLM foundations, prompt engineering, context engineering, loop engineering, graph engineering, prompt caching, agent engineering, AI system design, production AI, and 15 hands-on projects.
site_url: https://hardik-369.github.io/AI-Engineering-Handbook/
repo_url: https://github.com/Hardik-369/AI-Engineering-Handbook
repo_name: Hardik-369/AI-Engineering-Handbook
edit_uri: edit/main/

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
  icon:
    repo: fontawesome/brands/github
    admonition:
      note: octicons/tag-16
      tip: octicons/light-bulb-16
      warning: octicons/alert-16
      danger: octicons/flame-16

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Hardik-369
  generator: false

copyright: Copyright &copy; 2026 — MIT License

plugins:
  - search
  - git-revision-date-localized:
      enabled: false

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets:
      base_path: ["docs", "."]
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - tables
  - toc:
      permalink: true
  - attr_list
  - md_in_html

